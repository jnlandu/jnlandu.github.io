<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Hyperplane in R3 with normal vector</title>
  <desc id="desc">A tilted plane representing a hyperplane H in three dimensions, with a red normal vector a perpendicular to the plane.</desc>
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d62828"/>
    </marker>
    <marker id="arrow-axis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d4b5f"/>
    </marker>
    <linearGradient id="plane-fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#bde0fe"/>
      <stop offset="1" stop-color="#8ecae6"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b1f33" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="920" height="560" fill="#ffffff"/>

  <g opacity="0.58" stroke="#d8dee9" stroke-width="1">
    <path d="M150 402 L690 488"/>
    <path d="M178 360 L718 446"/>
    <path d="M206 318 L746 404"/>
    <path d="M234 276 L774 362"/>
    <path d="M262 234 L802 320"/>
    <path d="M290 192 L830 278"/>
    <path d="M197 452 L422 105"/>
    <path d="M287 466 L512 119"/>
    <path d="M377 480 L602 133"/>
    <path d="M467 494 L692 147"/>
    <path d="M557 508 L782 161"/>
  </g>

  <g stroke="#3d4b5f" stroke-width="2.5" fill="none" marker-end="url(#arrow-axis)">
    <path d="M150 438 L730 526"/>
    <path d="M150 438 L410 42"/>
    <path d="M150 438 L84 218"/>
  </g>
  <g fill="#3d4b5f" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="600">
    <text x="742" y="536">x1</text>
    <text x="414" y="36">x2</text>
    <text x="46" y="212">x3</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="270,336 538,132 802,222 522,438" fill="url(#plane-fill)" opacity="0.82" stroke="#1f6f8b" stroke-width="3"/>
    <path d="M331 290 L603 380" stroke="#2f6f88" stroke-width="1.5" opacity="0.55"/>
    <path d="M395 242 L667 332" stroke="#2f6f88" stroke-width="1.5" opacity="0.55"/>
    <path d="M459 194 L731 284" stroke="#2f6f88" stroke-width="1.5" opacity="0.55"/>
    <path d="M358 304 L632 96" stroke="#2f6f88" stroke-width="1.5" opacity="0.55"/>
    <path d="M438 332 L712 124" stroke="#2f6f88" stroke-width="1.5" opacity="0.55"/>
    <path d="M518 360 L792 152" stroke="#2f6f88" stroke-width="1.5" opacity="0.55"/>
  </g>

  <circle cx="536" cy="278" r="8" fill="#0b3954"/>
  <circle cx="486" cy="296" r="9" fill="#ffb703" stroke="#995f00" stroke-width="2"/>
  <path d="M536 278 L642 119" stroke="#d62828" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-red)"/>
  <path d="M536 278 L604 302" stroke="#0b3954" stroke-width="2" stroke-dasharray="7 7" opacity="0.8"/>
  <path d="M604 302 L642 119" stroke="#d62828" stroke-width="2" stroke-dasharray="7 7" opacity="0.45"/>

  <g font-family="Inter, system-ui, -apple-system, sans-serif">
    <text x="662" y="112" fill="#d62828" font-size="34" font-weight="700">a</text>
    <text x="334" y="190" fill="#0b3954" font-size="30" font-weight="700">H</text>
    <text x="334" y="229" fill="#0b3954" font-size="23">a<tspan baseline-shift="super" font-size="15">T</tspan>x = b</text>
    <text x="442" y="286" fill="#995f00" font-size="24" font-weight="700">x0</text>
    <text x="401" y="326" fill="#995f00" font-size="18">a<tspan baseline-shift="super" font-size="12">T</tspan>x0 = b</text>
  </g>
</svg>
