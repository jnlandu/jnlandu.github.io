<!-- KaTeX v0.16.11 — consistent version across all three assets -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
    onload="initKatex()"></script>
<script>
function initKatex() {
  // Render <script type="math/tex"> blocks produced by kramdown's math_engine: mathjax
  document.querySelectorAll('script[type="math/tex"]').forEach(function(el) {
    var span = document.createElement('span');
    span.innerHTML = katex.renderToString(el.textContent, { throwOnError: false });
    el.parentNode.replaceChild(span, el);
  });
  document.querySelectorAll('script[type="math/tex; mode=display"]').forEach(function(el) {
    var div = document.createElement('div');
    div.className = 'katex-display';
    div.innerHTML = katex.renderToString(el.textContent, { displayMode: true, throwOnError: false });
    el.parentNode.replaceChild(div, el);
  });
  // Also catch any remaining $...$ / $$...$$ that kramdown left as plain text
  renderMathInElement(document.body, {
    delimiters: [
      { left: '$$', right: '$$', display: true  },
      { left: '\\[', right: '\\]', display: true  },
      { left: '$',  right: '$',  display: false },
      { left: '\\(', right: '\\)', display: false }
    ],
    throwOnError: false
  });
}
</script>
