<div class="tags-bar" style="padding-top: 10rem;">
{% assign tags = page.tags | sort %}
{% for tag in tags %}
  <span class="tag-wrapper">
    <a class="tag-text" href="{{ '/tags/' | relative_url }}{{ tag | slugify }}">{{ tag | replace:'-', ' ' }}</a>
  </span>
{% endfor %}
</div>
<script type="text/javascript">
  setInvertedColor('tag-text');
</script>
